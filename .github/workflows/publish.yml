name: Publish

on:
  workflow_dispatch:
  push:
    branches: ["master"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm ci
      - name: Publish to npm (OIDC)
        env: {}
        run: |
          echo "Publishing (dry-run)"
          # To actually publish, remove the echo and run: npm publish --access public
